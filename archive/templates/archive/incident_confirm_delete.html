{% extends "archive/base.html" %}

{% block title %}Удаление инцидента | Specimen Archive{% endblock %}

{% block content %}
<main class="content-page content-page-form">
    <section class="confirm-panel form-panel-console">
        <p class="eyebrow">Подтверждение удаления</p>
        <h1>Удалить инцидент?</h1>
        <p class="page-copy">Будет удалена запись «{{ object.title }}», связанная с образцом {{ object.specimen.code }}.</p>
        <form method="post" class="confirm-actions">
            {% csrf_token %}
            <button type="submit" class="action-button primary">Удалить запись</button>
            <a href="{% url 'incident_detail' object.pk %}" class="action-button">Отмена</a>
        </form>
    </section>
</main>
{% endblock %}
