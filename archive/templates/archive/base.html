{% load static %}
{% now "U" as static_version %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Specimen Archive{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'archive/css/style.css' %}?v={{ static_version }}">
</head>
<body>
    <div class="page-shell">
        <header class="site-header">
            <a href="{% url 'home' %}" class="brand-mark">Specimen Archive</a>
            <nav class="site-nav" aria-label="Основная навигация">
                <a href="{% url 'home' %}">Главная</a>
                <a href="{% url 'specimen_list' %}">Образцы</a>
                <a href="{% url 'incident_list' %}">Инциденты</a>
                <a href="{% url 'specimen_create' %}">Добавить образец</a>
                <a href="{% url 'incident_create' %}">Добавить инцидент</a>
            </nav>
        </header>
        {% if messages %}
            <div class="message-stack">
                {% for message in messages %}
                    <div class="flash-message {{ message.tags }}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
        {% block content %}{% endblock %}
    </div>
    <script src="{% static 'archive/js/script.js' %}?v={{ static_version }}"></script>
</body>
</html>
